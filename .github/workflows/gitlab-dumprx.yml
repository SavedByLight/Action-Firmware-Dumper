        git config --global user.name "SavedByLight"
        git config --global user.email "mrfluffyoven@gmail.com"
        
        # Guard against dynamic spacing parsing issues by packing the remote URL into a clean bash string
        REMOTE_URL="https://${{ secrets.GITLAB_TOKEN_NAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/${{ env.USERNAME }}/android_dump_${{ env.MANUFACTURER_NAME }}_${{ env.VENDOR_NAME }}.git"
